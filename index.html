<!DOCTYPE html>
<html>

<head>

<title>Employee Request Portal</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:380px;
margin:auto;
margin-top:60px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px gray;
}

.logo{
text-align:center;
}

.logo img{
width:120px;
}

.company{
text-align:center;
font-size:18px;
margin-top:8px;
}

.tagline{
text-align:center;
font-size:13px;
color:#666;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2d89ef;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5fbf;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<div class="company">
Namo Padmavati Outsourcing Private Limited
</div>

<div class="tagline">
Integrity Before Income
</div>

<h3>Employee Request Portal</h3>

<form method="POST" action="https://script.google.com/macros/s/AKfycbzTgropZOTQ6RVASGMYMM-H26p7bVzXJ2cueYk5cy2j4dpCOng3XdrNw3ga2r-ed32Y/exec">

<label>Employee Name</label>
<input type="text" name="name" required>

<label>Employee ID</label>
<input type="text" name="employeeid" required>

<label>Request Type</label>
<select name="requesttype">
<option>Leave Request</option>
<option>Coming Late Today</option>
<option>Work From Home</option>
</select>

<label>Start Date</label>
<input type="date" name="startdate">

<label>End Date</label>
<input type="date" name="enddate">

<label>Reason</label>
<textarea name="reason"></textarea>

<button type="submit">Submit Request</button>

</form>

</div>

</body>

</html>
