<!DOCTYPE html>
<html>

<head>

<title>Employee Request Portal</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:380px;
margin:auto;
margin-top:60px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px gray;
}

.logo{
text-align:center;
}

.logo img{
width:120px;
}

.company{
text-align:center;
font-size:18px;
margin-top:8px;
}

.tagline{
text-align:center;
font-size:13px;
color:#666;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2d89ef;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<div class="company">
Namo Padmavati Outsourcing Private Limited
</div>

<div class="tagline">
Integrity Before Income
</div>

<h3>Employee Request Portal</h3>

<form id="form">

<label>Employee Name</label>
<input type="text" id="name" required>

<label>Employee ID</label>
<input type="text" id="id" required>

<label>Request Type</label>
<select id="request">
<option>Leave Request</option>
<option>Coming Late Today</option>
<option>Work From Home</option>
</select>

<label>Start Date</label>
<input type="date" id="startdate">

<label>End Date</label>
<input type="date" id="enddate">

<label>Reason</label>
<textarea id="reason"></textarea>

<button type="submit">Submit Request</button>

</form>

</div>

<script>

document.getElementById("form").addEventListener("submit", function(e){

e.preventDefault();

var data = {
name:document.getElementById("name").value,
id:document.getElementById("id").value,
request:document.getElementById("request").value,
startdate:document.getElementById("startdate").value,
enddate:document.getElementById("enddate").value,
reason:document.getElementById("reason").value
};

fetch("https://script.google.com/macros/s/AKfycbz8WSM5a6Lsfj_0B5J2aQ4fyWA-PQChnuliFklEm_SwbCKwKjx-uxOqV_G9nCoTuLB5/exec",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(data=>{
};
alert("Request Submitted Successfully");
document.getElementById("form").reset();
});

</script>

</body>
</html>
